{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Post Info{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'post/style.css' %}">
</head>
<body>
    <header class="site-header">
        <nav class="nav">
            <a class="brand" href="{% url 'post:post_list' %}">Post Info</a>
            <a class="nav-button" href="{% url 'post:post_list' %}">All Posts</a>
        </nav>
    </header>

    <main class="container">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
